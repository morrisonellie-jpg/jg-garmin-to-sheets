name: Garmin to Google Sheets Sync

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install .
          pip install python-dotenv

      - name: Create Credentials and .env
        run: |
          # Create the folder the script expects
          mkdir -p credentials
          
          # Write the Google Key from your secret into the file
          echo "${{ secrets.GOOGLE_CREDENTIALS }}" > credentials/client_secret.json
          
          # Manually build the .env file
          echo "USER1_GARMIN_EMAIL=${{ secrets.GARMIN_EMAIL }}" > .env
          echo "USER1_GARMIN_PASSWORD=${{ secrets.GARMIN_PASSWORD }}" >> .env
          echo "USER1_SHEET_ID=${{ secrets.SHEET_ID }}" >> .env

      - name: Debug - Check Files
        run: |
          ls -R
          echo "Credentials folder exists and contains:"
          ls credentials/

      - name: Run Garmin Sync
        run: |
          python -m src.main --output 2 --profile USER1 --start $(date -d "3 days ago" +%Y-%m-%d) --end $(date +%Y-%m-%d)
